<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <nav id="sidebar" class="bg-dark">
            <div class="sidebar-header">
                <h3><i class="bi bi-kanban-fill me-2"></i><span>TaskFlow</span></h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#" data-view="dashboard"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="tasks"><i class="bi bi-list-task"></i><span>Tasks</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="management"><i class="bi bi-building-gear"></i><span>Management</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="reports"><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a></li>
            </ul>
        </nav>

        <div class="main-wrapper">
             <header id="main-header">
                <button id="sidebar-toggle" class="btn"><i class="bi bi-list"></i></button>
                <h1 id="view-title" class="h3 mb-0">Dashboard</h1>
            </header>
            <main id="main-content">
                <div id="dashboard-view" class="view active-view"></div>
                <div id="tasks-view" class="view"></div>
                <div id="management-view" class="view"></div>
                <div id="reports-view" class="view"></div>
            </main>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <div id="loading-overlay"><div class="spinner-border text-light" role="status"></div></div>
    
    <!-- Modals are now separate from main content -->
    <div class="modal fade" id="create-task-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content"><div class="modal-header"><h5 class="modal-title">Create New Task</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="create-task-form"></form></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button><button type="button" class="btn btn-primary" id="create-task-btn">Create Task</button></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
