<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeatStock Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-container" class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card" style="width: 25rem;">
            <div class="card-body p-4">
                <h4 class="card-title text-center mb-4"><i class="bi bi-box-seam"></i> MeatStock Pro</h4>
                <form id="login-form">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="signInCode" class="form-label">Sign-In Code</label>
                        <input type="password" class="form-control" id="signInCode" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Sign In</button>
                    </div>
                </form>
                <div id="login-error" class="alert alert-danger mt-3" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <div id="main-app-container" class="d-none">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="#"><i class="bi bi-box-seam"></i> MeatStock Pro</a>
                <div id="navbar-content" class="ms-auto d-flex align-items-center"></div>
            </div>
        </nav>
        
        <div class="d-flex">
            <!-- SIDEBAR NAVIGATION -->
            <div id="sidebar" class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark">
                <ul class="nav nav-pills flex-column mb-auto">
                    <li class="nav-item"><a href="#" class="nav-link text-white active" data-page="page-dashboard"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li><a href="#" class="nav-link text-white" data-page="page-invoices"><i class="bi bi-receipt me-2"></i> Receive Invoice</a></li>
                    <li><a href="#" class="nav-link text-white" data-page="page-reports"><i class="bi bi-graph-up me-2"></i> Reports</a></li>
                    <li id="admin-nav-link" class="d-none"><a href="#" class="nav-link text-white" data-page="page-admin"><i class="bi bi-gear me-2"></i> Admin</a></li>
                </ul>
            </div>

            <!-- MAIN CONTENT AREA -->
            <main id="app-content" class="p-4">
                <div id="page-dashboard" class="app-page"></div>
                <div id="page-invoices" class="app-page" style="display: none;"></div>
                <div id="page-reports" class="app-page" style="display: none;"><h2>Stock & Activity Reports</h2><p>Reporting features can be built here.</p></div>
                <div id="page-admin" class="app-page" style="display: none;"></div>
            </main>
        </div>
    </div>
    
    <div id="loader" class="loader-overlay" style="display:none;"><div class="spinner-border text-primary"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
