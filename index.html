<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <nav id="sidebar" class="bg-dark">
            <div class="sidebar-header">
                <h3><i class="bi bi-kanban-fill me-2"></i>TaskFlow</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item"><a class="nav-link active" href="#" data-view="dashboard"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="tasks"><i class="bi bi-list-task"></i><span>Tasks</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="management"><i class="bi bi-building-gear"></i><span>Management</span></a></li>
                <li class="nav-item"><a class="nav-link" href="#" data-view="reports"><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a></li>
            </ul>
        </nav>

        <main id="main-content">
            <div id="dashboard-view" class="view active-view"></div>
            <div id="tasks-view" class="view"></div>
            <div id="management-view" class="view"></div>
            <div id="reports-view" class="view"></div>
        </main>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <div class="modal fade" id="confirm-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content"><div class="modal-header"><h5 class="modal-title" id="confirm-modal-title">Are you sure?</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="confirm-modal-body">This action cannot be undone.</div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-danger" id="confirm-modal-button">Confirm</button></div></div>
        </div>
    </div>
    <div class="modal fade" id="edit-task-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content"><div class="modal-header"><h5 class="modal-title">Edit Task</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><form id="edit-task-form"><input type="hidden" id="edit-task-id"><div class="mb-3"><label for="edit-task-title" class="form-label">Title</label><input type="text" id="edit-task-title" class="form-control" required></div><div class="mb-3"><label for="edit-task-description" class="form-label">Description</label><textarea id="edit-task-description" class="form-control" rows="4"></textarea></div></form></div><div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button><button type="button" class="btn btn-primary" id="save-task-changes">Save Changes</button></div></div>
        </div>
    </div>

    <div id="loading-overlay"><div class="spinner-border text-light" role="status"></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
