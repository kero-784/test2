<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Task Management Dashboard</a>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <ul class="nav nav-tabs" id="main-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="dashboard-tab" data-bs-toggle="tab" data-bs-target="#dashboard-pane" type="button" role="tab">Dashboard</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="management-tab" data-bs-toggle="tab" data-bs-target="#management-pane" type="button" role="tab">Management</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="reports-tab" data-bs-toggle="tab" data-bs-target="#reports-pane" type="button" role="tab">Reports</button>
            </li>
        </ul>

        <div class="tab-content" id="myTabContent">
            <!-- ===== DASHBOARD PANE ===== -->
            <div class="tab-pane fade show active" id="dashboard-pane" role="tabpanel">
                <div class="row mt-3">
                    <div class="col-lg-4">
                        <div class="card">
                            <div class="card-header"><h3>Create New Task</h3></div>
                            <div class="card-body">
                                <form id="create-task-form">
                                    <!-- Form content is dynamically generated by script.js -->
                                </form>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-8">
                        <div class="d-flex justify-content-between align-items-center">
                            <h2>Tasks</h2>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" role="switch" id="show-inactive-toggle">
                                <label class="form-check-label" for="show-inactive-toggle">Show Inactive</label>
                            </div>
                        </div>
                        <div id="task-list" class="mt-3 vh-100 overflow-auto">
                            <div class="text-center" id="task-loader">
                                <div class="spinner-border text-primary" role="status"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== MANAGEMENT PANE ===== -->
            <div class="tab-pane fade" id="management-pane" role="tabpanel">
                <div class="row mt-3">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header"><h4>Manage Branches</h4></div>
                            <div class="card-body">
                                <form id="branch-form" class="mb-3">
                                    <div class="input-group">
                                        <input type="text" id="new-branch-name" class="form-control" placeholder="New Branch Name" required>
                                        <button class="btn btn-success" type="submit">Add Branch</button>
                                    </div>
                                </form>
                                <ul id="branch-list" class="list-group">
                                    <!-- Branch list is dynamically generated -->
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header"><h4>Manage Sections</h4></div>
                            <div class="card-body">
                                <form id="section-form" class="mb-3">
                                    <div class="input-group">
                                        <input type="text" id="new-section-name" class="form-control" placeholder="New Section Name" required>
                                        <button class="btn btn-success" type="submit">Add Section</button>
                                    </div>
                                </form>
                                <ul id="section-list" class="list-group">
                                    <!-- Section list is dynamically generated -->
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== REPORTS PANE ===== -->
            <div class="tab-pane fade" id="reports-pane" role="tabpanel">
                 <!-- Report UI is dynamically generated -->
            </div>
        </div>
    </div>
    
    <!-- MODALS -->
    <div class="modal fade" id="edit-task-modal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Task</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="edit-task-form">
                        <input type="hidden" id="edit-task-id">
                        <div class="mb-3">
                            <label for="edit-task-title" class="form-label">Title</label>
                            <input type="text" id="edit-task-title" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="edit-task-description" class="form-label">Description</label>
                            <textarea id="edit-task-description" class="form-control" rows="4"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="save-task-changes">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Loading Overlay -->
    <div id="loading-overlay">
        <div class="spinner-border text-light" role="status"></div>
    </div>

    <!-- JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Application Script -->
    <script src="script.js"></script>
</body>
</html>
